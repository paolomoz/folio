  .topic-mark {

    display: flex; align-items: baseline; gap: 1.6rem;

  .anchor-rule { width: 64px; height: 1px; background: var(--timber); }
  .anchor-num {

    font-weight: 600; font-size: 2.4rem; color: var(--sumi);
    letter-spacing: -0.02em;
  }
  .anchor-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--timber);
  }

  /* Vertical Japanese-style date column on the right */
  .date-column {
    position: fixed; right: 4rem; bottom: 5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.24em;
