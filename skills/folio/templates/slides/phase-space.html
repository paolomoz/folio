<!DOCTYPE html>
<!--
  Pattern: 04 · Phase Space
  Job:     plot a journey across two dimensions; show trajectory or a region.
  Slot:    middle.
  Shape:   meta-and-diagram. SVG plot with labelled axes. The "zone" or path
           uses --field as a block (never as a 1px line for quiet palettes).
           Annotations are in --structure mono.
  Replace: {{TITLE}}, {{TOPIC}}, {{SLIDE_NUM}}, {{TOTAL}},
           {{PREV_HREF}}, {{NEXT_HREF}}, {{EYEBROW}}, {{STATION}}, {{STATION_SUB}},
           {{BODY}}, {{TERM}}, {{TERM_DEFINITION}},
           {{X_AXIS_LABEL}}, {{Y_AXIS_LABEL}},
           {{X_TICKS}}, {{Y_TICKS}}, {{ZONE_POLYGON}}, {{ZONE_LABELS}}, {{ANNOTATIONS}}.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}} · {{SLIDE_NUM}} / {{TOTAL}} · Phase Space</title>
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/palette.css">
<style>
  body { overflow: hidden; }

  .phase-meta .station {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 500;
    font-size: clamp(2.6rem, 4.5vw, 3.8rem);
    line-height: 1.04; letter-spacing: -0.02em;
    color: var(--type); margin-bottom: 1.4rem;
  }
  .phase-meta .station .struct {
    font-family: 'Inter', sans-serif;
    font-style: normal; font-weight: 300;
    color: var(--structure);
    display: block; font-size: 0.55em; margin-top: 0.4rem;
    letter-spacing: 0.04em;
  }
  .phase-meta p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--structure);
    font-size: 1.15rem; line-height: 1.6;
    max-width: 32ch; margin-bottom: 1.4rem;
  }
  .phase-meta .definition {
    margin-top: 1.4rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; letter-spacing: 0.1em;
    color: var(--structure); line-height: 1.6;
  }
  .phase-meta .definition .term {
    color: var(--field); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em;
  }

  .plot-frame {
    position: relative;
    width: 100%; max-width: 720px; aspect-ratio: 5 / 4;
  }
  .plot-frame svg { width: 100%; height: 100%; display: block; }

  .axis-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.24em; text-transform: uppercase;
    fill: var(--structure); font-weight: 600;
  }
  .tick-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; fill: var(--type-dim); letter-spacing: 0.04em;
  }
  .zone-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 0.95rem; fill: var(--field-on);
  }
  .zone-tier {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; fill: rgba(255,255,255,0.78);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .annotation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; fill: var(--structure);
    letter-spacing: 0.16em; text-transform: uppercase;
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo"><span>folio</span><span class="sep">/</span><span class="topic">{{TOPIC}}</span></div>
  <div class="slide-counter">SLIDE · {{SLIDE_NUM}} / {{TOTAL}}</div>
  <div class="topnav-actions">
    <a class="nav-link" href="{{PREV_HREF}}">← Prev</a>
    <a class="nav-link" href="{{NEXT_HREF}}">Next →</a>
  </div>
</nav>

<aside class="side-dots">
  {{SIDE_DOTS}}
</aside>

<div class="meta-diagram">
  <aside class="meta phase-meta">
    <div class="eyebrow reveal reveal-1">{{EYEBROW}}</div>
    <h2 class="station reveal reveal-2">
      {{STATION}}
      <span class="struct">{{STATION_SUB}}</span>
    </h2>
    <p class="reveal reveal-3">{{BODY}}</p>
    <div class="definition reveal reveal-4">
      <span class="term">{{TERM}}</span><br>
      {{TERM_DEFINITION}}
    </div>
  </aside>

  <div class="diagram reveal reveal-3">
    <div class="plot-frame">
      <svg viewBox="0 0 600 480" preserveAspectRatio="xMidYMid meet">
        <!-- Grid -->
        <g stroke="var(--structure)" stroke-opacity="0.12" stroke-width="0.6">
          <!-- Adjust grid lines to your axis ticks -->
          <line x1="60" y1="420" x2="570" y2="420"/>
          <line x1="60" y1="355" x2="570" y2="355"/>
          <line x1="60" y1="290" x2="570" y2="290"/>
          <line x1="60" y1="225" x2="570" y2="225"/>
          <line x1="60" y1="160" x2="570" y2="160"/>
          <line x1="60" y1="95"  x2="570" y2="95"/>
          <line x1="60" y1="30"  x2="570" y2="30"/>
          <line x1="60"  y1="30" x2="60"  y2="420"/>
          <line x1="145" y1="30" x2="145" y2="420"/>
          <line x1="230" y1="30" x2="230" y2="420"/>
          <line x1="315" y1="30" x2="315" y2="420"/>
          <line x1="400" y1="30" x2="400" y2="420"/>
          <line x1="485" y1="30" x2="485" y2="420"/>
          <line x1="570" y1="30" x2="570" y2="420"/>
        </g>

        <!-- Zone block — uses --field as a wall -->
        {{ZONE_POLYGON}}
        <!-- Example: <polygon points="80,420 230,420 480,30 350,30 80,360" fill="var(--field)" fill-opacity="0.92"/> -->

        <!-- Axes -->
        <line x1="60" y1="420" x2="570" y2="420" stroke="var(--structure)" stroke-width="1.5"/>
        <line x1="60" y1="30"  x2="60"  y2="420" stroke="var(--structure)" stroke-width="1.5"/>

        <!-- X ticks -->
        <g class="tick-label" text-anchor="middle">
          {{X_TICKS}}
          <!-- Example:
            <text x="60"  y="442">+30°C</text>
            <text x="145" y="442">+15°C</text>
            ...
          -->
        </g>

        <!-- Y ticks -->
        <g class="tick-label" text-anchor="end">
          {{Y_TICKS}}
        </g>

        <!-- Axis labels -->
        <text x="315" y="470" class="axis-label" text-anchor="middle">{{X_AXIS_LABEL}}</text>
        <text x="20"  y="225" class="axis-label" transform="rotate(-90, 20, 225)" text-anchor="middle">{{Y_AXIS_LABEL}}</text>

        <!-- Zone labels (inside the field block) -->
        {{ZONE_LABELS}}

        <!-- Annotations (outside the zone) -->
        {{ANNOTATIONS}}
      </svg>
    </div>
  </div>
</div>

<div class="slide-foot">
  <a href="{{PREV_HREF}}">← Prev</a>
  <a href="{{NEXT_HREF}}">Next →</a>
</div>

<script src="assets/effects.js"></script>
<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') location.href = '{{NEXT_HREF}}';
    if (e.key === 'ArrowLeft') location.href = '{{PREV_HREF}}';
  });
</script>
</body>
</html>
